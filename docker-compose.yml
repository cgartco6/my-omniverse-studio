version: '3.8'

services:
  studio-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - studio_shared_assets:/app/studio_storage
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  studio-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    restart: always
    depends_on:
      - studio-backend

volumes:
  studio_shared_assets:
