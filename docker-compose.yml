version: '3.8'

services:
  studio-backend:
    image: python:3.11-slim
    volumes:
      - ./backend:/app
      - studio_shared_assets:/studio_storage
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn chromadb pydantic && python app/main.py"
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  studio-frontend:
    image: node:18-alpine
    volumes:
      - ./frontend:/app
    working_dir: /app
    # Installs basic tooling and boots up the workspace dashboard
    command: sh -c "npm install -g create-react-app && [ ! -f package.json ] && npx create-react-app . --template typescript || npm install && npm start"
    ports:
      - "3000:3000"
    environment:
      - WDS_SOCKET_PORT=3000
    restart: always

volumes:
  studio_shared_assets:
